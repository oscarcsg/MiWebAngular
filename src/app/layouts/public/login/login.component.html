<div class="max-w-md mx-auto mt-20 p-8 border rounded-lg shadow-md bg-white">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Iniciar Sesión</h2>

    <div class="flex flex-col gap-4">
        <input
            type="text"
            placeholder="Email (ej. master@lemoncode.net)"
            [(ngModel)]="userName"
            class="border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500"
        />

        <input
            type="password"
            placeholder="Contraseña (ej. 1234)"
            [(ngModel)]="password"
            class="border border-gray-300 p-2 rounded focus:outline-none focus:border-blue-500"
        />

        <button
            (click)="intentarLogin()"
            class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition-colors mt-2"
        >
            Entrar
        </button>
    </div>
</div>
